<! DOCTYPE html >
<html>
<head>
  <title>Dev-Onix AI</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}

body{
  margin:0;
  background:#DBE9FA;
  font-family:sans-serif;
  text-align:center;
}

/* back button */
.back{
  margin:10px;
  font-size:30px;
  text-align:left;
}
.back a{
  text-decoration:none;
  color:#000;
}

/* title */
h1{
  font-size:40px;
  font-family:Georgia, serif;
  margin-top:10px;
}

/* circle */
.circleBox{
  position:relative;
  width:150px;
  height:150px;
  margin:5% auto;
}

/* main circle */
.circle{
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid #000;
  overflow:hidden;
  background:#fff;
}

.circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* plus button */
.plus{
  position:absolute;
  bottom:5%;  /* বাইরে আনছে */
  right:0%;
  width:40px;
  height:40px;
  border-radius:70%;
  background:#fff;
  color:#000;
  border:2px solid #000; /* 🔥 এটা circle ঢেকে দিবে */
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.plus:active{
  transform:scale(0.85);
}

/* image */
.circle img{
  width:100%;
  height:100%;
}
/* text */
h2{
  margin-top:2%;
}

.pra{
  padding:5% 10%;
  font-size:16px;
  line-height:1.5;
  margin-bottom:2%;
}

/* button */
.Agree{
  margin-top:5%;
}

.a{
  border:2px solid #000;
  color:#fff;
  background:#00f;
  padding:10px 40px;
  border-radius:25px;
  font-size:25px;
  cursor:pointer;
}
p {
  font-size:20px;
}

/* লোডিং স্পিনার */
.loading {
  display: none;
  text-align: center;
  margin: 20px 0;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #00f;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.error-msg {
  color: red;
  font-weight: bold;
  margin: 10px 0;
  display: none;
}

.success-msg {
  color: green;
  font-weight: bold;
  margin: 10px 0;
  display: none;
}
</style>
</head>

<body>

<!-- back -->
<div class="back">
  <a href="password.html">⋘</a>
</div>

<!-- title -->
<h1><i>Dev-Onix AI</i></h1>
  
  <form onsubmit="finishSignup(event)">

  <!-- circle -->
  <div class="circleBox">
  <div class="circle">
    <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
  </div>
  <span class="plus" id="plusBtn" onclick="handlePlusClick()">+</span>
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="loadImage(event)">

  <!-- text -->
  <h2 id="uploadText"><u>Upload your picture</u></h2>

  <!-- paragraph -->
  <div class="pra">
    <p>
      An account will be created for you in <b><u style="font-family:Georgia, serif;">Dev-Onix AI</u></b> Company with your information.
      So to confirm your account, upload your picture and click on the <b>"I Agree"</b> button.
    </p>
  </div>

  <!-- লোডিং এবং মেসেজ -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>আপনার অ্যাকাউন্ট তৈরি হচ্ছে...</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- button -->
  <div class="Agree">
    <input type="submit" value="I Agree" class="a" id="agreeBtn">
  </div>

</form>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAT2lFlsHO47bsm3UiX1jUqeaFI_OVJKes",
    authDomain: "devonix-ai.firebaseapp.com",
    projectId: "devonix-ai",
    storageBucket: "devonix-ai.firebasestorage.app",
    messagingSenderId: "67398450167",
    appId: "1:67398450167:web:15ace091d76a14fe0f4cf2",
    databaseURL: "https://devonix-ai-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const storage = firebase.storage(); 

  let profileImageFile = null; 

  // ছবি আপলোডের লজিক
  window.handlePlusClick = function(){
    let btn = document.getElementById("plusBtn");
    btn.classList.add("clicked");

    setTimeout(() => {
      btn.classList.remove("clicked");
      document.getElementById("fileInput").click();
    }, 150);
  }

  window.loadImage = function(event){
    let file = event.target.files[0];
    profileImageFile = file;
    
    if(file){
      let reader = new FileReader();
      reader.onload = function(){
        let imageData = reader.result;
        // লোকাল স্টোরেজে সেভ করছি (ব্যাকআপের জন্য)
        localStorage.setItem("profileImage", imageData);
        document.getElementById("preview").src = imageData;
        document.getElementById("uploadText").style.display = "none";
      }
      reader.readAsDataURL(file);
    }
  }

  // ফর্ম সাবমিট লজিক
  window.finishSignup = function(event){
    event.preventDefault();

    alert("Step 1: Function Started");

    if (!profileImageFile) {
        alert("কোন ছবি সিলেক্ট করা হয়নি");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("agreeBtn").disabled = true;

    const userId = "user_" + Date.now();

    alert("Step 2: Upload Starting");

    const storageRef = storage.ref();
    const imageRef = storageRef.child(
      "profile_images/" + userId + "/" + profileImageFile.name
    );

    imageRef.put(profileImageFile)

    .then(function(snapshot){

        alert("Step 3: Image Uploaded");

        return snapshot.ref.getDownloadURL();
    })

    .then(function(downloadURL){

        alert("Step 4: URL Received");

        const userData = {
            firstName: localStorage.getItem("fname") || "",
            lastName: localStorage.getItem("lname") || "",
            dateOfBirth: localStorage.getItem("dob") || "",
            country: localStorage.getItem("coun") || "",
            gender: localStorage.getItem("gender") || "",
            phone: localStorage.getItem("phone") || "",
            profileImage: downloadURL,
            createdAt: new Date().toISOString()
        };

        return database.ref("users/" + userId).set(userData);
    })

    .then(function(){

        alert("Step 5: Database Saved");

        document.getElementById("loading").style.display = "none";

        localStorage.setItem("isLoggedIn","true");

        alert("Step 6: Redirecting");

        window.location.href = "open.html";
    })

    .catch(function(error){

        document.getElementById("loading").style.display = "none";
        document.getElementById("agreeBtn").disabled = false;

        alert(
          "ERROR:\n\n" +
          error.code +
          "\n\n" +
          error.message
        );

        console.log(error);
    });
          }

  function showError(message) {
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.innerText = message;
    errorMsg.style.display = "block";
    setTimeout(() => {
      errorMsg.style.display = "none";
    }, 3000);
  }

  function showSuccess(message) {
    const successMsg = document.getElementById("successMsg");
    successMsg.innerText = message;
    successMsg.style.display = "block";
  }
</script>
</body>
</html>
