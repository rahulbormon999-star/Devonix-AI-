<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    background:#72d1cf;
    font-family: Arial, sans-serif;
}

/* উপরের লেখা */
h1{
    margin-top:40px;
    font-size:40px;
    font-weight:bold;
    font-family:Georgia, serif;
    color:#ff0;
}

/* মাঝখানের অংশ */
.center{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-left:35%;
}

/* বাটন */
button{
    padding:8px 20px;
    font-size:25px;
    background:blue;
    color:white;
    border:solid 3px #000;
    border-radius:20px;
}
    @keyframes slideDown{
    from{
        transform: translateY(-50px);
        opacity: 0;
    }
    to{
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes slideUp{
    from{
        transform: translateY(50px);
        opacity: 0;
    }
    to{
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes pulse{
    0%{
        box-shadow: 0 0 0 0 rgba(0,0,0,0.3);
    }
    70%{
        box-shadow: 0 0 0 20px rgba(0,0,0,0);
    }
    100%{
        box-shadow: 0 0 0 0 rgba(0,0,0,0);
    }
}
/*  এনিমেশন ২*/
    body{
margin:0;
padding:0;
}

.ai-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:url("rahul.jpg");
background-size:cover;
background-position:center;
z-index:-1;
}

/* glowing light animation */
.ai-bg::after{
content:"";
position:absolute;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(0,255,255,0.8) 2px, transparent 4px);
background-size:120px 120px;
animation: moveLight 6s linear infinite;
opacity:0.6;
}

@keyframes moveLight{
0%{
background-position:0 0;
}
100%{
background-position:200px 200px;
}
}
</style>
</head>

<body>
<h1 style="animation: slideDown 1.5s ease forwards;
opacity: 0;"><b><i>Dev-Onix ai</i></b></h1>

<div class="center">
    <a href="name.html"><button style="animation: slideUp 1.5s ease forwards, pulse 2s infinite 2s;
opacity: 0;">Get Start</button></a>
</div>
<div class="ai-bg"></div>
</body>
</html>
