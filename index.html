<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    background:#72d1cf;
    font-family: Arial, sans-serif;
}

/* উপরের লেখা */
h1{
    margin-top:40px;
    font-size:40px;
    font-weight:bold;
}

/* মাঝখানের অংশ */
.center{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-left:35%;
}

/* বাটন */
button{
    padding:8px 20px;
    font-size:25px;
    background:blue;
    color:white;
    border:solid 3px #000;
    border-radius:20px;
}
    @keyframes slideDown{
    from{
        transform: translateY(-50px);
        opacity: 0;
    }
    to{
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes slideUp{
    from{
        transform: translateY(50px);
        opacity: 0;
    }
    to{
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes pulse{
    0%{
        box-shadow: 0 0 0 0 rgba(0,0,0,0.3);
    }
    70%{
        box-shadow: 0 0 0 20px rgba(0,0,0,0);
    }
    100%{
        box-shadow: 0 0 0 0 rgba(0,0,0,0);
    }
}
</style>
</head>

<body>

<h1 style="animation: slideDown 1.5s ease forwards;
opacity: 0;"><b><i>Dev-Onix ai</i></b></h1>

<div class="center">
    <button style="animation: slideUp 1.5s ease forwards, pulse 2s infinite 2s;
opacity: 0;">Get Start</button>
</div>

</body>
</html>
