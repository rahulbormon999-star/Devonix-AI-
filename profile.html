<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: 0; background: #fff; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }

  /* Overlay (মেনু খুললে পেছনের কালো আস্তরণ) */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); opacity: 0; visibility: hidden;
    transition: 0.3s; z-index: 5;
  }
  #overlay.active { opacity: 1; visibility: visible; }

  /* মেনু বাটন */
  .menu-btn {
    position: fixed; top: 4%; left: 7%; cursor: pointer;
    width: 9vw; height: 5vh; border: 2px solid #000;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 6vw; transition: 0.3s; z-index: 15; background: #fff;
  }
  .menu-btn:active { transform: scale(0.9); }

  /* সাইড মেনু */
  .menu {
    position: fixed; top: 0; left: -100%; width: 60%; height: 100%;
    background: #fff; border-right: 1px solid #ddd;
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20% 8%; z-index: 20;
    box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  }
  .menu.active { left: 0; }

  .menu a {
    display: block; color: #333; text-decoration: none;
    font-size: 4vw; margin-bottom: 6%; padding: 3%;
    border-radius: 10px; transition: 0.3s; border-bottom: 1px solid #f0f0f0;
  }
  .menu a:hover { background: #f9f9f9; }
  .menu a:active { transform: scale(0.98); background: #eee; }

  /* ক্লোজ বাটন */
  .close-btn { position: absolute; top: 3%; right: 5%; font-size: 7vw; cursor: pointer; }

  h2 { font-size: 6vw; margin-top: 20%; color: #000; font-style: Georgia, serif; }
  
   /* প্রোফাইল কার্ড (Main Content) */
  .profile-card {
    position: relative;
    z-index: 2;
    background: #fff;
    width: 90%;
    max-width: 450px;
    margin-top: 100px;
    margin-bottom: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 30px 20px;
    text-align: center;
  }

  .profile-img-wrapper {
    position: relative;
    width: 130px;
    height: 130px;
    margin: -80px auto 15px;
    border-radius: 50%;
    background: #fff;
    padding: 5px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    background: #e0e0e0;
  }

  .profile-name { font-size: 24px; font-weight: 700; color: #222; margin-bottom: 5px; }
  .profile-bio { font-size: 14px; color: #777; margin-bottom: 25px; }

  /* ইনফরমেশন লিস্ট */
  .info-list {
    text-align: left;
    margin-top: 20px;
  }

  .info-item {
    display: flex;
    align-items: center;
    padding: 15px;
    background: #f8fafc;
    border-radius: 12px;
    margin-bottom: 12px;
    border: 1px solid #eef2f6;
    transition: 0.3s;
  }
  .info-item:hover { background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: #dbeafe; }

  .info-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: #e0f2fe; color: #0284c7;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-right: 15px;
  }

  .info-text { flex-grow: 1; }
  .info-text small { display: block; font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-text strong { display: block; font-size: 15px; color: #222; margin-top: 3px; }

  /* ডেক্সটপ স্ক্রিনের জন্য মিডিয়া কোয়েরি */
  @media (min-width: 768px) {
    .profile-card { padding: 40px; margin-top: 120px; }
    .menu-btn { top: 30px; left: 30px; width: 50px; height: 50px; }
  }
</style>
</head>
<body>

  <!-- Overlay for closing menu -->
  <div id="overlay" onclick="toggleMenu()"></div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <div class="close-btn" onclick="toggleMenu()">✖</div>
    <a href="#" onclick="gohome()">🏠 Home</a>
    <a href="#">👤 Profile</a>
    <a href="#" onclick="gosetting()">⚙️ Setting</a>
    <a href="#" onclick="goabout()">❗ About</a>
  <!--  <a href="#" onclick="logout()">𓉱 Logout</a> -->
    <h2><i>Dev-Onix AI</i></h2>
  </div>
   
   <!-- Profile Card -->
  <div class="profile-card">
    <div class="profile-img-wrapper">
      <img id="profilePic" class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile Picture">
    </div>
    
    <h2 class="profile-name" id="name">User Name</h2>
    <p class="profile-bio">My Profile Information</p>

    <div class="info-list">
      
      <!-- Phone -->
      <div class="info-item">
        <div class="info-icon">📞</div>
        <div class="info-text">
          <small>Phone Number</small>
          <strong id="phone">Not set</strong>
        </div>
      </div>

      <!-- Country -->
      <div class="info-item">
        <div class="info-icon">🌍</div>
        <div class="info-text">
          <small>Country</small>
          <strong id="country">Not set</strong>
        </div>
      </div>

      <!-- Gender -->
      <div class="info-item">
        <div class="info-icon">👤</div>
        <div class="info-text">
          <small>Gender</small>
          <strong id="gender">Not set</strong>
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="info-item">
        <div class="info-icon">📅</div>
        <div class="info-text">
          <small>Date of Birth</small>
          <strong id="showDob">Not set</strong>
        </div>
      </div>

      <!-- Age -->
      <div class="info-item" id="ageContainer">
        <div class="info-icon">⏳</div>
        <div class="info-text">
          <small>Current Age</small>
          <strong id="showAge">Not available</strong>
        </div>
      </div>

    </div>
  </div>
  <script>
    function toggleMenu(){
      let m = document.getElementById("menu");
      let o = document.getElementById("overlay");
      
      m.classList.toggle("active");
      o.classList.toggle("active");
    }

    function gohome(){ window.location.href="open.html"; }
    function gosetting(){ window.location.href="setting.html"; }
    function goabout(){ window.location.href="about.html"; }
    function logout(){
        localStorage.setItem("isLoggedIn", "false");
        window.location.href = "log-sin.html";
    }
    
    // Load Data from Local Storage
    document.addEventListener("DOMContentLoaded", function() {
        // Image
        let img = localStorage.getItem("profileImage");
        if(img){ document.getElementById("profilePic").src = img; }

        // Name
        let fname = localStorage.getItem("fname") || "";
        let lname = localStorage.getItem("lname") || "";
        if(fname || lname) {
            document.getElementById("name").innerText = fname + " " + lname;
        }

        // General Info
        let country = localStorage.getItem("coun") || "Not set";
        let gender = localStorage.getItem("gender") || "Not set";
        let phone = localStorage.getItem("phone") || "Not set";

        document.getElementById("country").innerText = country;
        document.getElementById("gender").innerText = gender;
        document.getElementById("phone").innerText = phone;

        // DOB & Age Calculation
        let dob = localStorage.getItem("dob");
        if(dob){
            document.getElementById("showDob").innerText = dob;

            let birth = new Date(dob);
            let today = new Date();

            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            let days = today.getDate() - birth.getDate();

            if (days < 0) {
                months--;
                let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += prevMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }
        
            document.getElementById("showAge").innerHTML = years + " years, " + months + " months, " + days + " days";
        } else {
            document.getElementById("ageContainer").style.display = "none"; // Hide age if DOB is not set
        }
    });
  </script>
</body>
      </html>
