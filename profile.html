body{
margin:0;

}
h1{
font-size:40px;

}

/* 🔥 Dev-Onix AI নিচে fix করা */
h2 {
  margin-top:90%;
  text-align:center;
  font-family: Georgia, serif;
}

/* Profile লেখা */
.profile{
  margin-top:15%;
  text-align:center;
  font-size:20px;
}

/* ☰ button */
.menu-btn{
  font-size:20px;
  position:fixed;
  top:2%;
  left:5%;
  cursor:pointer;
  width:6%;
  height:4%;
  padding-left:1.5%;
  border:solid 2px #000;
  border-radius:5px;
}

/* menu box */
.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:40%;
  height:100%;
  background:#000;
  transition:0.3s;
}

/* ✅ সঠিক করা */
.menu, a{
  display:block;
  color:#fff;
  text-decoration:none;
  font-size:17px;
  padding-top:10%;
  padding-left:3%;
}

.menu a:hover{
  color:#fff;
}

.menu a:active{
  color:#00f;
}

/* close button */
.close-btn{
  position:absolute;
  top:0%;
  right:5%;
  font-size:25px;
  color:#fff;
  cursor:pointer;
}
h3 {
  text-align:center;
  font-size:30px;
  letter-spacing:1px;
  margin-top:20%;
}

<script>
// menu toggle
function toggleMenu(){
  let m = document.getElementById("menu");

  if(m.style.left === "0px"){
    m.style.left = "-250px";
  } else {
    m.style.left = "0px";
  }
}

// image load
let img = localStorage.getItem("profileImage");

if(img){
  document.getElementById("profilePic").src = img;
}
