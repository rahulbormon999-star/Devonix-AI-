<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
*{
  -webkit-tap-highlight-color: transparent;
}
body{
margin:0;
padding:0;
height:100vh;
background:#fef;
font-family:Georgia, serif;
}
h1{
font-size:40px;
letter-spacing:2px;
text-align:center;
}

/* Profile Box */
.profile-box{
  margin-top:20%;
  text-align:center;
  font-size:20px;
}

/* ☰ button */
.menu-btn{
  font-size:20px;
  position:fixed;
  top:2%;
  left:5%;
  cursor:pointer;
  width:40px;
  height:40px;
  text-align:center;
  border:solid 2px #000;
  border-radius:5px;
  background:#fff;
}

/* menu box */
.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#000;
  transition:0.3s;
}

/* menu links */
.menu a{
  display:block;
  color:#fff;
  text-decoration:none;
  font-size:17px;
  padding:15px;
}

/* close button */
.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:25px;
  color:#fff;
  cursor:pointer;
}

/* animation */
.title{
text-align:center;
font-size:40px;
margin-top:20%;
animation: dropDown 2s ease forwards;
}

@keyframes dropDown{
0%{transform:translateY(-200px);opacity:0;}
100%{transform:translateY(0);opacity:1;}
}
</style>
</head>

<body>

<h1 class="title"><i>My Profile</i></h1>

<!-- Profile Data -->
<div class="profile-box">
  <p id="name"></p>
</div>

<!-- ☰ button -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>

  <a href="open.html">🏠 Home</a>
  <a href="profile.html">👤 Profile</a>
  <a href="#">⚙️ Setting</a>
  <a href="about.html">❗ About</a>
  <a href="#" onclick="logout()">𓉱 Logout</a>
</div>

<script>
// menu toggle
function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.left = (m.style.left === "0px") ? "-250px" : "0px";
}

// 🔥 data load (main part)
let fname = localStorage.getItem("fname") || "";
let lname = localStorage.getItem("lname") || "";

document.getElementById("name").innerHTML =
  "Name: " + fname + " " + lname;

// logout system
function logout(){
  localStorage.clear();
  window.location.replace("index.html");
}
</script>

</body>
</html>
