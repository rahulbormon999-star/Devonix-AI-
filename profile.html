<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: 0; background: #fff; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }

  /* Overlay (মেনু খুললে পেছনের কালো আস্তরণ) */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); opacity: 0; visibility: hidden;
    transition: 0.3s; z-index: 5;
  }
  #overlay.active { opacity: 1; visibility: visible; }

  /* মেনু বাটন */
  .menu-btn {
    position: fixed; top: 4%; left: 7%; cursor: pointer;
    width: 9vw; height: 5vh; border: 2px solid #000;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 6vw; transition: 0.3s; z-index: 15; background: #fff;
  }
  .menu-btn:active { transform: scale(0.9); }

  /* সাইড মেনু */
  .menu {
    position: fixed; top: 0; left: -100%; width: 60%; height: 100%;
    background: #fff; border-right: 1px solid #ddd;
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20% 8%; z-index: 20;
    box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  }
  .menu.active { left: 0; }

  .menu a {
    display: block; color: #333; text-decoration: none;
    font-size: 4vw; margin-bottom: 6%; padding: 3%;
    border-radius: 10px; transition: 0.3s; border-bottom: 1px solid #f0f0f0;
  }
  .menu a:hover { background: #f9f9f9; }
  .menu a:active { transform: scale(0.98); background: #eee; }

  /* ক্লোজ বাটন */
  .close-btn { position: absolute; top: 3%; right: 5%; font-size: 7vw; cursor: pointer; }

  /* কন্টেন্ট */
  .title { margin-top: 30%; text-align: center; font-size: 9vw; animation: dropDown 1s ease forwards; }

  @keyframes dropDown {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  h2 { font-size: 6vw; margin-top: 20%; color: #000; font-style: Georgia, serif; }
  h1{
    margin-top:8%;
    letter-spacing:1px;
  }
  /* Profile লেখা */
.profile{
  margin-top:5%;
  padding-left:10%;
  font-size:5vw;
}
.profile-img{
  width:20vh;
  height:20vh;
  border-radius:50%;
  border:2px solid #000;

  object-fit:cover;   /* 🔥 সবচেয়ে important */
  display:block;
    }
</style>
</head>
<body>

  <!-- Overlay for closing menu -->
  <div id="overlay" onclick="toggleMenu()"></div>

  <h1 class="title"><i>My Profile</i></h1>
  <div class="profile">
    <img id="profilePic" class="profile-img">
  <h4 id="name"></h4>
  <p id="country"></p>
  <p id="gender"></p>
  <p id="showDob"></p>
    <p id="showAge"></p>
    <p id="phone"></p>
  </div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <div class="close-btn" onclick="toggleMenu()">✖</div>
    <a href="#" onclick="goopen()">🏠 Home</a>
    <a href="#">👤 Profile</a>
    <a href="#" onclick="gosetting()">⚙️ Setting</a>
    <a href="#" onclick="goabout()">❗ About</a>
    <a href="#" onclick="logout()">𓉱 Logout</a>
    <h2><i>Dev-Onix AI</i></h2>
  </div>

  <script>
    function toggleMenu(){
      let m = document.getElementById("menu");
      let o = document.getElementById("overlay");
      
      m.classList.toggle("active");
      o.classList.toggle("active");
    }

    function goopen(){ window.location.href="open.html"; }
    function gosetting(){ window.location.href="setting.html"; }
    function goabout(){ window.location.href="about.html"; }
    function logout(){
        localStorage.setItem("isLoggedIn", "false");
        window.location.href = "login.html";
    }
    
    // image load
  let img = localStorage.getItem("profileImage");
  if(img){
    document.getElementById("profilePic").src = img;
  }

  // name
  let fname = localStorage.getItem("fname") || "";
  let lname = localStorage.getItem("lname") || "";

  // country + gender
  let country = localStorage.getItem("coun") || "Not set";
  let gender = localStorage.getItem("gender") || "Not set";

  // show UI
  document.getElementById("name").innerHTML =
    "Name : " + fname + " " + lname;

  document.getElementById("country").innerHTML =
    "Country : " + country;

  document.getElementById("gender").innerHTML =
    "Gender : " + gender;

  
  // 🔥 DOB + Age (only once)
  let dob = localStorage.getItem("dob");

  if(dob){
    document.getElementById("showDob").innerHTML =
      "Date of Birth : " + dob;

    let birth = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    let days = today.getDate() - birth.getDate();

    if (days < 0) {
      months--;
      let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
      days += prevMonth.getDate();
    }

    if (months < 0) {
      years--;
      months += 12;
    }
  
    document.getElementById("showAge").innerHTML =
      "Age : "+" " + years + "<sup>ye</sup> - " + months + "<sup>mo</sup> - " + days + "<sup>d</sup>" } 
      else {
  document.getElementById("showDob").innerHTML = "Date of Birth : Not set";
  document.getElementById("showAge").innerHTML = "";
        }
    
  let phone = localStorage.getItem("phone") || "Not set";
document.getElementById("phone").innerHTML = "Phone : " + phone;
  </script>
</body>
</html>
