<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="My website">
<meta name="author" content="Rahul Dev">
<meta name="robots" content="index, follow">
<title>Dev-Onix AI</title>

<style>
*{
  -webkit-tap-highlight-color: transparent;
}
body{
margin:0;
padding:0;
height:100vh;
background:#fef;
font-family:Georgia, serif;
}
h1{
font-size:40px;
letter-spacing:2px;
text-align:center;
}

/* 🔥 Dev-Onix AI নিচে fix করা */
h2 {
  margin-top:90%;
  text-align:center;
  font-family: Georgia, serif;
}

/* Profile লেখা */
.profile{
  margin-top:15%;
  padding-left:20%;
  font-size:20px;
}

/* ☰ button */
.menu-btn{
  font-size:20px;
  position:fixed;
  top:2%;
  left:5%;
  cursor:pointer;
  width:6%;
  height:4%;
  padding-left:1.5%;
  border:solid 2px #000;
  border-radius:5px;
}

/* menu box */
.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:40%;
  height:100%;
  background:#000;
  transition:0.3s;
}

/* ✅ সঠিক করা */
.menu, a{
  display:block;
  color:#fff;
  text-decoration:none;
  font-size:17px;
  padding-top:10%;
  padding-left:3%;
}

.menu a:hover{
  color:#fff;
}

.menu a:active{
  color:#00f;
}

/* close button */
.close-btn{
  position:absolute;
  top:0%;
  right:5%;
  font-size:25px;
  color:#fff;
  cursor:pointer;
}
h3 {
  text-align:center;
  font-size:30px;
  letter-spacing:1px;
  margin-top:20%;
}

  .profile-img{
  width:170px;
  height:170px;
  border-radius:50%;
  border:2px solid #000;

  object-fit:cover;   /* 🔥 সবচেয়ে important */
  display:block;
    }
</style>
</head>
<body>

<!--<h1 class="title"><i>Dev-Onix AI</i></h1>-->
<h3><u>My Profile</u></h3>

<!-- Profile Data -->
  <div class="profile">
    <img id="profilePic" class="profile-img">
  <h4 id="name"></h4>
  <p id="country"></p>
  <p id="gender"></p>
  <p id="showDob"></p>
    <p id="showAge"></p>
    <p id="phone"></p>
  </div>

<!-- ☰ button -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>

  <a href="#" onclick="goopen()">🏠 Home</a>
  <a href="#">👤 Profile</a>
  <a href="#" onclick="gosetting()">⚙️ Setting</a>
  <a href="#" onclick="goabout()">❗ About</a>
  <a href="#" onclick="logout()">𓉱 Logout</a>

  <!-- 🔥 নিচে fixed -->
  <h2><i>Dev-Onix <br>AI</i></h2>
</div>

  <script>
  // menu toggle
  function toggleMenu(){
    let m = document.getElementById("menu");

    if(m.style.left === "0px"){
      m.style.left = "-250px";
    } else {
      m.style.left = "0px";
    }
  }

  // image load
  let img = localStorage.getItem("profileImage");
  if(img){
    document.getElementById("profilePic").src = img;
  }

  // name
  let fname = localStorage.getItem("fname") || "";
  let lname = localStorage.getItem("lname") || "";

  // country + gender
  let country = localStorage.getItem("coun") || "Not set";
  let gender = localStorage.getItem("gender") || "Not set";

  // show UI
  document.getElementById("name").innerHTML =
    "Name : " + fname + " " + lname;

  document.getElementById("country").innerHTML =
    "Country : " + country;

  document.getElementById("gender").innerHTML =
    "Gender : " + gender;

  
  function goopen(){
    window.location.href="open.html";
  }
  function gosetting(){
      window.location.href="setting.html";
    }
    function goabout(){
      window.location.href="about.html";
    }

    function logout(){
      window.location.href="log-sin.html";
    }

  // 🔥 DOB + Age (only once)
  let dob = localStorage.getItem("dob");

  if(dob){
    document.getElementById("showDob").innerHTML =
      "Date of Birth : " + dob;

    let birth = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birth.getFullYear();
    let months = today.getMonth() - birth.getMonth();
    let days = today.getDate() - birth.getDate();

    if (days < 0) {
      months--;
      let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
      days += prevMonth.getDate();
    }

    if (months < 0) {
      years--;
      months += 12;
    }
  
    document.getElementById("showAge").innerHTML =
      "Age : "+" " + years + "<sup>ye</sup> - " + months + "<sup>mo</sup> - " + days + "<sup>d</sup>" } 
      else {
  document.getElementById("showDob").innerHTML = "Date of Birth : Not set";
  document.getElementById("showAge").innerHTML = "";
        }
    
  let phone = localStorage.getItem("phone") || "Not set";
document.getElementById("phone").innerHTML = "Phone : " + phone;

    
    /* back to open.html */
       
  </script>
</body>
</html>
