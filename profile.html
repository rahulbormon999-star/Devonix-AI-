<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  padding:0;
  font-family: Arial;
  background:#f5f5f5;
}

h1{
  text-align:center;
  margin-top:20px;
}

.profile-box{
  width:90%;
  margin:30px auto;
  padding:20px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

p{
  font-size:20px;
  margin:10px 0;
}

button{
  margin-top:20px;
  padding:10px 20px;
  font-size:16px;
}
</style>

</head>
<body>

<h1>My Profile</h1>

<div class="profile-box">
  <p id="fullname"></p>
</div>

<div style="text-align:center;">
  <button onclick="goHome()">Back</button>
</div>

<script>
// data load করা
let fname = localStorage.getItem("fname");
let lname = localStorage.getItem("lname");

// show করা
document.getElementById("fullname").innerHTML =
  "Name: " + fname + " " + lname;

// back button
function goHome(){
  window.location.replace("index.html");
}
</script>

</body>
  </html>
