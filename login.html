<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dev-Onix AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, serif;
  -webkit-tap-highlight-color: transparent;

}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Card */
.container{
width:85%;
padding:10% 5%;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
color:#fff;
text-align:center;
animation: fadeIn 1s ease;
}

h2{
margin-bottom:20px;
}

/* Input */
.inputBox{
position:relative;
margin-bottom:18px;
}

.inputBox input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background: rgba(255,255,255,0.15);
color:#fff;
font-size:15px;
outline:none;
}

/* Label */
.inputBox label{
position:absolute;
left:5%;
top:5%;
color:#bbb;
font-size:17px;
transition:0.3s;
pointer-events:none;
}

.inputBox input:focus + label,
.inputBox input:valid + label{
top:-30%;
left:5%;
font-size:17px;
color:#fff;
}

/* Eye icon */
.eye{
position:absolute;
right:3%;
top:25%;
cursor:pointer;
font-size:18px;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background: linear-gradient(45deg,#00dbde,#fc00ff);
color:#fff;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Error */
.error{
margin-top:7%;
font-size:14px;
color:#ff6b6b;
}

/* Animation */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <!-- Full Name -->
  <div class="inputBox">
    <input type="text" id="fullname" required>
    <label>Full Name</label>
  </div>

  <!-- Password -->
  <div class="inputBox">
    <input type="password" id="pass" required>
    <label>Password</label>
    <span class="eye" onclick="togglePass()">👁️</span>
  </div>

  <button onclick="login()">Login</button>

  <p id="msg" class="error"></p>
</div>

<script>
function login(){

  let inputName = document.getElementById("fullname").value.trim();
  let inputPass = document.getElementById("pass").value.trim();

  let fname = localStorage.getItem("fname");
  let lname = localStorage.getItem("lname");
  let savedPass = localStorage.getItem("userPassword");

  let fullName = fname + " " + lname;

  if(inputName === "" || inputPass === ""){
    document.getElementById("msg").innerText = "⚠️ Fill all fields";
    return;
  }

  if(inputName === fullName && inputPass === savedPass){

    localStorage.setItem("isLogin","true");
    window.location.href = "open.html";

  }else{
    document.getElementById("msg").innerText = "❌ ভুল নাম বা পাসওয়ার্ড";
  }
}

/* 👁 Show / Hide Password */
function togglePass(){
  let input = document.getElementById("pass");

  if(input.type === "password"){
    input.type = "text";
  }else{
    input.type = "password";
  }
}
</script>

</body>
</html>
