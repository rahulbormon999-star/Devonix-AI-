<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Secure Login Page">
<meta name="author" content="Rahul Dev">
<title>Login | Dev-Onix</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    /* মোবাইলের জন্য সাইডে যেন একটু ফাঁকা থাকে তাই প্যাডিং দেওয়া হলো */
    padding: 5%; 
  }

  /* Main Card (Fluid Width & Padding) */
  .card {
    background: #ffffff;
    width: 100%;
    max-width: 420px; /* ল্যাপটপে যেন অতিরিক্ত বড় না হয় */
    
    /* clamp() এর কারণে মোবাইলে প্যাডিং কম নিবে, ল্যাপটপে বেশি নিবে */
    padding: clamp(25px, 6vw, 40px) clamp(20px, 5vw, 35px); 
    
    border-radius: clamp(15px, 4vw, 20px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.3s ease;
  }

  /* Header / Avatar */
  .avatar {
    width: clamp(60px, 15vw, 75px);
    height: clamp(60px, 15vw, 75px);
    background: #eff6ff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(28px, 8vw, 35px);
    margin: 0 auto clamp(10px, 3vw, 15px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  /* Fluid Typography (অটোমেটিক ছোট-বড় হবে) */
  .card h2 {
    color: #111827;
    font-size: clamp(20px, 6vw, 26px);
    font-weight: 700;
    margin-bottom: 5px;
  }

  .card p.subtitle {
    color: #6b7280;
    font-size: clamp(12px, 3.5vw, 14px);
    margin-bottom: clamp(20px, 5vw, 25px);
  }

  /* Inputs */
  .input-group {
    text-align: left;
    margin-bottom: clamp(12px, 3vw, 18px);
  }

  .input-group label {
    display: block;
    font-size: clamp(12px, 3.5vw, 14px);
    font-weight: 600;
    color: #4b5563;
    margin-bottom: 6px;
  }

  .input-box {
    position: relative;
    width: 100%;
  }

  .input-box input {
    width: 100%;
    height: clamp(45px, 12vw, 52px); /* মোবাইলে সুন্দরভাবে আঙুল দিয়ে চাপার জন্য */
    padding: 0 45px 0 15px;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    font-size: clamp(14px, 4vw, 16px);
    color: #1f2937;
    background: #f9fafb;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .input-box input:focus {
    outline: none;
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
  }

  /* Eye Icon */
  .eye {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: clamp(16px, 5vw, 20px);
    color: #9ca3af;
    transition: 0.2s;
    padding: 5px; /* ক্লিক এরিয়া বাড়ানোর জন্য */
  }
  .eye:hover { color: #4b5563; }

  /* Error / Success Message */
  #msg {
    margin-top: clamp(8px, 2vw, 12px);
    font-size: clamp(13px, 3.5vw, 15px);
    font-weight: 500;
    min-height: 20px;
  }

  /* Login Button */
  button {
    width: 100%;
    height: clamp(45px, 12vw, 52px);
    margin-top: clamp(15px, 4vw, 20px);
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: #fff;
    font-size: clamp(15px, 4vw, 17px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  }

  button:hover {
    background: #5a67d8;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  }

  button:active { transform: translateY(0); }
  
  button:disabled {
    background: #a0aec0;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Shake Animation for Wrong Password */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    75% { transform: translateX(-10px); }
  }

  .shake-anim { animation: shake 0.4s ease-in-out; }

</style>
</head>

<body>

<div class="card" id="loginCard">

  <div class="avatar">🔐</div>
  <h2>Welcome Back</h2>
  <p class="subtitle">Enter your credentials to access your account</p>

  <!-- First Name -->
  <div class="input-group">
    <label for="fname">First Name</label>
    <div class="input-box">
      <input type="text" id="fname" placeholder="e.g. Rahul">
    </div>
  </div>

  <!-- Last Name -->
  <div class="input-group">
    <label for="lname">Last Name</label>
    <div class="input-box">
      <input type="text" id="lname" placeholder="e.g. Dev">
    </div>
  </div>

  <!-- Password -->
  <div class="input-group">
    <label for="pass">Password</label>
    <div class="input-box">
      <input type="password" id="pass" placeholder="Enter your password">
      <span class="eye" onclick="togglePass()">👁️</span>
    </div>
  </div>

  <p id="msg"></p>

  <button id="loginBtn" onclick="login()">Login</button>

</div>


<script>

// SHOW / HIDE PASSWORD
function togglePass(){

  let input = document.getElementById("pass");
  let eyeIcon = document.querySelector(".eye");

  if(input.type === "password"){

    input.type = "text";
    eyeIcon.innerText = "🙈";

  }else{

    input.type = "password";
    eyeIcon.innerText = "👁️";

  }
}

// ERROR FUNCTION
function showError(text){

  let msg = document.getElementById("msg");
  let card = document.getElementById("loginCard");

  msg.style.color = "red";
  msg.innerText = text;

  // SHAKE ANIMATION
  card.classList.add("shake-anim");

  setTimeout(()=>{

    card.classList.remove("shake-anim");

  },400);

}

// LOGIN FUNCTION
function login(){

  // USER INPUT
  let inputF = document.getElementById("fname").value.trim();
  let inputL = document.getElementById("lname").value.trim();
  let inputP = document.getElementById("pass").value.trim();

  // MESSAGE & BUTTON
  let msg = document.getElementById("msg");
  let btn = document.getElementById("loginBtn");

  // LOCAL STORAGE DATA
  let savedF = localStorage.getItem("fname");
  let savedL = localStorage.getItem("lname");
  let savedP = localStorage.getItem("userPassword");

  // DEBUG CHECK
  console.log("Saved First Name:", savedF);
  console.log("Saved Last Name:", savedL);
  console.log("Saved Password:", savedP);

  console.log("Input First Name:", inputF);
  console.log("Input Last Name:", inputL);
  console.log("Input Password:", inputP);

  // EMPTY CHECK
  if(inputF === "" || inputL === "" || inputP === ""){

    showError("❌ দয়া করে সবগুলো ঘর পূরণ করুন");
    return;

  }

  // LOGIN CHECK
  if(
    inputF.toLowerCase() === savedF.toLowerCase() &&
    inputL.toLowerCase() === savedL.toLowerCase() &&
    inputP === savedP
  ){

    msg.style.color = "green";
    msg.innerText = "✅ Login Successful!";

    btn.innerText = "Redirecting...";
    btn.disabled = true;

    // SAVE LOGIN STATUS
    localStorage.setItem("isLoggedIn","true");

    // REDIRECT
    setTimeout(()=>{

      window.location.href = "open.html";

    },1500);

  }else{

    showError("❌ First Name, Last Name অথবা Password ভুল");

  }

}

// ENTER KEY SUPPORT
document.addEventListener("keypress", function(event){

  if(event.key === "Enter"){

    login();

  }

});

</script>
</body>
</html>
