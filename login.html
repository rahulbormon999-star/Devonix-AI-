<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="My website">
<meta name="author" content="Rahul Dev">
<meta name="robots" content="index, follow">
<title>Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

/* CARD */
.card{
  background:#fff;
  padding:25px;
  width:90%;
  max-width:350px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  text-align:center;
}

.card h2{
  margin-bottom:20px;
}

/* INPUT */
.input-box{
  margin-top:10px;
  position:relative;
}

.input-box input{
  width:100%;
  height:45px;
  padding:0 40px 0 10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

/* EYE */
.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#5a67d8;
}

/* MESSAGE */
#msg{
  margin-top:10px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h2>🔐 Login</h2>

<!-- NAME -->
<div class="input-box">
  <input type="text" id="fname" placeholder="First Name">
</div>

<div class="input-box">
  <input type="text" id="lname" placeholder="Last Name">
</div>

<!-- PASSWORD -->
<div class="input-box">
  <input type="password" id="pass" placeholder="Password">
  <span class="eye" onclick="togglePass()">👁️</span>
</div>

<p id="msg"></p>

<button onclick="login()">Login</button>

</div>

<script>

// SHOW/HIDE PASSWORD
function togglePass(){
  let input = document.getElementById("pass");

  if(input.type === "password"){
    input.type = "text";
  }else{
    input.type = "password";
  }
}

// LOGIN FUNCTION
function login(){

  let inputF = document.getElementById("fname").value;
  let inputL = document.getElementById("lname").value;
  let inputP = document.getElementById("pass").value;

  // STORED DATA
  let savedF = localStorage.getItem("fname");
  let savedL = localStorage.getItem("lname");
  let savedP = localStorage.getItem("userPassword");

  let msg = document.getElementById("msg");

  if(inputF === savedF && inputL === savedL && inputP === savedP){
    
    msg.style.color = "green";
    msg.innerText = "✅ Login Successful";

    // 🔥 REDIRECT
    setTimeout(()=>{
      window.location.href = "open.html";
    },1000);

  }
  else{
    msg.style.color = "red";
    msg.innerText = "❌ ভুল তথ্য দিয়েছে";
  }

};
 

      
</script>
</body>
</html>
