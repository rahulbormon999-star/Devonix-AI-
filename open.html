<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>
<style>
body{
margin:0;
padding:0;
height:100vh;
align-items:center;
background:#dfd;
font-family:Georgia, serif;
}
h1{
font-size:40px;
letter-spacing:2px;
text-align:center;
}
/*h1 animation */
h1{
text-align:center;
font-size:40px;
color:#000;
margin-top:40px;
/* animation */
animation: dropDown 2s ease forwards;
}
/* animation system */
@keyframes dropDown{
0%{
transform:translateY(-200px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}
</style>
</head>
<body>
<h1><i>Wellcome to My<br>Dev-Onix AI</i></h1>
</body>
</html>
