<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বপ্ন ব্যাখ্যা - হিন্দু শাস্ত্র</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg-color:#ffffff;--sidebar-bg:#f9f9f9;--text-color:#0d0d0d;--border-color:#e5e5e5;--user-msg-bg:#f4f4f4;--font-family:'Noto Sans Bengali',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box;font-family:var(--font-family)}
        body{display:flex;height:100vh;background-color:var(--bg-color);color:var(--text-color);overflow:hidden;position:relative}
        .overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.2);z-index:90}
        .overlay.active{display:block}
        .sidebar{position:absolute;left:-300px;top:0;height:100%;width:280px;background-color:var(--sidebar-bg);border-right:1px solid var(--border-color);display:flex;flex-direction:column;transition:left .3s ease;z-index:100}
        .sidebar.open{left:0}
        .sidebar-header{padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color)}
        .new-chat-btn{flex-grow:1;padding:10px;background:transparent;border:1px solid var(--border-color);border-radius:5px;cursor:pointer;text-align:left;font-weight:500}
        .new-chat-btn:hover{background-color:#ececec}
        .history-list{flex-grow:1;overflow-y:auto;padding:10px}
        .history-item{padding:12px 10px;margin-bottom:5px;border-radius:5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;user-select:none;-webkit-user-select:none}
        .history-item:hover,.history-item.active{background-color:#ececec}
        .clear-history{padding:15px;border-top:1px solid var(--border-color);cursor:pointer;color:red;text-align:center;font-weight:500}
        .main-content{flex-grow:1;display:flex;flex-direction:column;position:relative;width:100%}
        .header{padding:15px 20px;display:flex;align-items:center;position:sticky;top:0;background:var(--bg-color);z-index:10}
        .menu-btn{background:none;border:none;font-size:20px;cursor:pointer;margin-right:15px;color:#555}
        .chat-container{flex-grow:1;overflow-y:auto;padding:20px;padding-bottom:120px;scroll-behavior:smooth}
        .message-wrapper{display:flex;width:100%;margin-bottom:25px;clear:both}
        .message-wrapper.user{justify-content:flex-end}
        .message-wrapper.ai{justify-content:flex-start}
        .message{max-width:85%;display:flex;line-height:1.6}
        .message-content{font-size:16px}
        .message-wrapper.user .message-content{background-color:var(--user-msg-bg);padding:12px 18px;border-radius:20px}
        .message-wrapper.ai .message-content{padding:10px 0;color:#202123}
        .input-container{position:absolute;bottom:7%;left:0;width:100%;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,0) 0%,#ffffff 30%);display:flex;justify-content:center}
        .input-box{width:100%;max-width:800px;position:relative;display:flex;align-items:flex-end;border:1px solid var(--border-color);border-radius:20px;background-color:white;box-shadow:0 4px 15px rgba(0,0,0,0.05);padding:5px 10px}
        textarea{width:100%;max-height:200px;min-height:50px;padding:12px 10px;border:none;outline:none;resize:none;font-size:16px;background:transparent;overflow-y:auto}
        .send-btn{background-color:#10a37f;color:white;border:none;width:35px;height:35px;border-radius:10px;margin:8px 5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
        .send-btn:disabled{background-color:#ccc;cursor:not-allowed}
        .typing-indicator{display:inline-block;font-style:italic;color:#888}
        .religion-btn{
    flex:1;
    padding:8px;
    border:1px solid var(--border-color);
    background:#fff;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
}

.religion-btn.active{
    background:#10a37f;
    color:#fff;
    border-color:#10a37f;
}
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header" style="flex-direction:column;align-items:stretch;gap:10px;">
    
    <!-- 🔥 Religion Switch -->
    <div style="display:flex;gap:5px;">
        <button class="religion-btn active" onclick="setReligion('sanatan')">🕉️ সনাতন</button>
        <button class="religion-btn" onclick="setReligion('islam')">☪️ ইসলাম</button>
    </div>

    <!-- Existing Button (unchanged) -->
    <button class="new-chat-btn" onclick="startNewChat()">+ নতুন স্বপ্ন</button>

</div>
        <div class="history-list" id="history-list"></div>
        <div class="clear-history" onclick="clearAllHistory()">
            <i class="fa-solid fa-trash"></i> সব হিস্ট্রি মুছুন
        </div>
    </div>
    <div class="main-content">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <h2 style="font-size:18px;font-weight:600;">স্বপ্ন শাস্ত্র (AI)</h2>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="input-container">
            <div class="input-box">
                <textarea id="user-input" placeholder="আপনার স্বপ্নের কথা লিখুন..." rows="1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "http://10.14.68.20:5000/api/interpret";
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const historyList = document.getElementById('history-list');
        let chatSessions = JSON.parse(localStorage.getItem('dreamChatSessions')) || [];
        let currentSessionId = null;
        updateHistoryUI();
        function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('active')}
        function autoResize(t){t.style.height='auto';t.style.height=t.scrollHeight+'px'}
        function handleEnter(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
        async function sendMessage(){
            const text = userInput.value.trim();
            if(!text) return;
            appendMessage('user', text);
            userInput.value=''; userInput.style.height='auto';
            sendBtn.disabled=true;
            saveMessageToSession('user', text);
            const aiMsgDiv = appendMessage('ai','<span class="typing-indicator">শাস্ত্র বিশ্লেষণ করা হচ্ছে...</span>');
            try{
                const aiText = await fetchAPI(text);
                typeWriterEffect(aiText, aiMsgDiv);
                saveMessageToSession('ai', aiText);
            }catch(error){
                aiMsgDiv.innerHTML = `<em style="color:#c0392b">⚠️ ${error.message||"সংযোগ ত্রুটি"}</em>`;
            }
            sendBtn.disabled=false;
        }
        function appendMessage(sender,text){
            const w=document.createElement('div'); w.classList.add('message-wrapper',sender);
            const m=document.createElement('div'); m.classList.add('message');
            const f=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
            m.innerHTML=`<div class="message-content">${f}</div>`;
            w.appendChild(m); chatContainer.appendChild(w);
            chatContainer.scrollTop=chatContainer.scrollHeight;
            return m.querySelector('.message-content');
        }
        function typeWriterEffect(text,element){
            element.innerHTML=''; let i=0;
            const f=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
            function type(){
                if(i<f.length){
                    let c=f.charAt(i);
                    if(c==='<'){let tag='';while(f.charAt(i)!=='>'&&i<f.length){tag+=f.charAt(i);i++}tag+='>';element.innerHTML+=tag}
                    else{element.innerHTML+=c}
                    i++;chatContainer.scrollTop=chatContainer.scrollHeight;setTimeout(type,15);
                }
            }
            type();
        }
        async function fetchAPI(userDream){
    const r = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            dream:userDream,
            religion:selectedReligion   // 🔥 add
        })
    });

    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.error||`সার্ভার ত্রুটি (${r.status})`);
    return d.text||"উত্তর পাওয়া যায়নি।";
}
        function saveMessageToSession(role,text){
            if(!currentSessionId){currentSessionId=Date.now().toString();const n={id:currentSessionId,title:text.substring(0,35)+(text.length>35?'...':''),messages:[]};chatSessions.unshift(n);if(chatSessions.length>20)chatSessions.pop()}
            const s=chatSessions.find(x=>x.id===currentSessionId);
            if(s)s.messages.push({role,text});
            localStorage.setItem('dreamChatSessions',JSON.stringify(chatSessions));
            updateHistoryUI();
        }
        function loadSession(id){
            currentSessionId=id; chatContainer.innerHTML='';
            if(sidebar.classList.contains('open'))toggleSidebar();
            const s=chatSessions.find(x=>x.id===id);
            if(s)s.messages.forEach(m=>appendMessage(m.role,m.text));
            updateHistoryUI();
        }
        function updateHistoryUI(){
            historyList.innerHTML='';
            chatSessions.forEach(session=>{
                const div=document.createElement('div'); div.classList.add('history-item');
                if(session.id===currentSessionId)div.classList.add('active');
                div.innerText=session.title;
                let timer,longPress=false;
                const start=()=>{longPress=false;timer=setTimeout(()=>{longPress=true;if(confirm('আপনি কি এই চ্যাটটি মুছে ফেলতে চান?')){chatSessions=chatSessions.filter(s=>s.id!==session.id);localStorage.setItem('dreamChatSessions',JSON.stringify(chatSessions));if(currentSessionId===session.id)startNewChat();updateHistoryUI()}},600)};
                const cancel=()=>clearTimeout(timer);
                div.addEventListener('mousedown',start); div.addEventListener('mouseup',cancel); div.addEventListener('mouseleave',cancel);
                div.addEventListener('touchstart',start,{passive:true}); div.addEventListener('touchend',cancel); div.addEventListener('touchmove',cancel);
                div.onclick=()=>{if(longPress)return;loadSession(session.id)};
                historyList.appendChild(div);
            });
        }
        function startNewChat(){chatContainer.innerHTML='';currentSessionId=null;if(sidebar.classList.contains('open'))toggleSidebar();updateHistoryUI()}
        function clearAllHistory(){if(confirm('আপনি কি পূর্বের সব হিস্ট্রি মুছে ফেলতে চান?')){chatSessions=[];localStorage.removeItem('dreamChatSessions');startNewChat()}}
        
        let selectedReligion = localStorage.getItem("religion") || "sanatan";

function setReligion(type){
    selectedReligion = type;
    localStorage.setItem("religion", type);

    document.querySelectorAll(".religion-btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    if(type === "sanatan"){
        document.querySelectorAll(".religion-btn")[0].classList.add("active");
    }else{
        document.querySelectorAll(".religion-btn")[1].classList.add("active");
    }
}

// load হলে আগের selection দেখাবে
window.addEventListener("load", ()=>{
    setReligion(selectedReligion);
});
    </script>
</body>
  </html>
