<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বপ্ন ব্যাখ্যা - হিন্দু শাস্ত্র</title>
    <!-- বাংলা ফন্ট ইমপোর্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- আইকন ইমপোর্ট -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-color: #0d0d0d;
            --border-color: #e5e5e5;
            --user-msg-bg: #f4f4f4;
            --font-family: 'Noto Sans Bengali', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Overlay for Sidebar */
        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 90;
        }

        .overlay.active {
            display: block;
        }

        /* Sidebar Styles */
        .sidebar {
            position: absolute;
            left: -300px;
            top: 0;
            height: 100%;
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 100;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            flex-grow: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-weight: 500;
        }

        .new-chat-btn:hover {
            background-color: #ececec;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
            user-select: none;
            -webkit-user-select: none;
        }

        .history-item:hover, .history-item.active {
            background-color: #ececec;
        }

        .clear-history {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            color: red;
            text-align: center;
            font-weight: 500;
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        .header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 10;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
            color: #555;
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px;
            scroll-behavior: smooth;
        }

        /* Chat Message Layout */
        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 25px;
            clear: both;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.ai {
            justify-content: flex-start;
        }

        .message {
            max-width: 85%;
            display: flex;
            line-height: 1.6;
        }

        .message-content {
            font-size: 16px;
        }

        .message-wrapper.user .message-content {
            background-color: var(--user-msg-bg);
            padding: 12px 18px;
            border-radius: 20px;
        }

        .message-wrapper.ai .message-content {
            padding: 10px 0;
            color: #202123;
        }

        /* Input Area Styles */
        .input-container {
            position: absolute;
            bottom: 7%;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff 30%);
            display: flex;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            position: relative;
            display: flex;
            align-items: flex-end;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 5px 10px;
        }

        textarea {
            width: 100%;
            max-height: 200px;
            min-height: 50px;
            padding: 12px 10px;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            background: transparent;
            overflow-y: auto;
        }

        .send-btn {
            background-color: #10a37f;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            margin: 8px 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: inline-block;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="startNewChat()">+ নতুন স্বপ্ন</button>
        </div>
        <div class="history-list" id="history-list">
            <!-- History items will appear here -->
        </div>
        <div class="clear-history" onclick="clearAllHistory()">
            <i class="fa-solid fa-trash"></i> সব হিস্ট্রি মুছুন
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h2 style="font-size: 18px; font-weight: 600;">স্বপ্ন শাস্ত্র (AI)</h2>
        </div>

        <div class="chat-container" id="chat-container">
            <!-- Chat is empty initially -->
        </div>

        <div class="input-container">
            <div class="input-box">
                <textarea id="user-input" placeholder="আপনার স্বপ্নের কথা লিখুন..." rows="1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script>
      // ==========================================
        // আপনার একাধিক Google Gemini API Key এখানে দিন
        // ==========================================
        let API_URL = "http://YOUR-IP:5000/api";

        let currentKeyIndex = 0; // এটি ট্র্যাক করবে বর্তমানে কোন কি ব্যবহার হচ্ছে

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const historyList = document.getElementById('history-list');

        let chatSessions = JSON.parse(localStorage.getItem('dreamChatSessions')) || [];
        let currentSessionId = null;

        updateHistoryUI();

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
 

        async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    saveMessageToSession('user', text);

    const aiMsgDiv = appendMessage('ai', '<span class="typing-indicator">শাস্ত্র বিশ্লেষণ করা হচ্ছে...</span>');

    try {
        // 👉 এখানেই তোমার তৈরি function ব্যবহার করো
        const aiText = await fetchAPI(text);

        typeWriterEffect(aiText, aiMsgDiv);
        saveMessageToSession('ai', aiText);

    } catch (error) {
        aiMsgDiv.innerHTML = "API সমস্যা বা Key শেষ!";
    }

    sendBtn.disabled = false;
        }

        function appendMessage(sender, text) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.classList.add('message-wrapper', sender);

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            msgDiv.innerHTML = `<div class="message-content">${formattedText}</div>`;
            
            wrapperDiv.appendChild(msgDiv);
            chatContainer.appendChild(wrapperDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return msgDiv.querySelector('.message-content');
        }

        function typeWriterEffect(text, element) {
            element.innerHTML = '';
            let i = 0;
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            function type() {
                if (i < formattedText.length) {
                    let char = formattedText.charAt(i);
                    if(char === '<') {
                        let tag = '';
                        while(formattedText.charAt(i) !== '>' && i < formattedText.length) {
                            tag += formattedText.charAt(i);
                            i++;
                        }
                        tag += '>';
                        element.innerHTML += tag;
                    } else {
                        element.innerHTML += char;
                    }
                    i++;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    setTimeout(type, 15);
                }
            }
            type();
        }

        // ==========================================
        // মাল্টিপল API Key হ্যান্ডেল করার নতুন ফাংশন
        // ==========================================
        async function fetchAPI(userDream) {
    const response = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: userDream
        })
    });

    const data = await response.json();

    if (data.error) {
        throw new Error(data.error);
    }

    return data.candidates[0].content.parts[0].text;
        }

        // History Management Functions
        function saveMessageToSession(role, text) {
            if (!currentSessionId) {
                currentSessionId = Date.now().toString();
                const newSession = {
                    id: currentSessionId,
                    title: text.substring(0, 35) + (text.length > 35 ? '...' : ''),
                    messages: []
                };
                chatSessions.unshift(newSession);
                if(chatSessions.length > 20) chatSessions.pop(); 
            }

            const session = chatSessions.find(s => s.id === currentSessionId);
            if (session) {
                session.messages.push({ role, text });
            }

            localStorage.setItem('dreamChatSessions', JSON.stringify(chatSessions));
            updateHistoryUI();
        }

        function loadSession(id) {
            currentSessionId = id;
            chatContainer.innerHTML = '';
            if(sidebar.classList.contains('open')) toggleSidebar();
            
            const session = chatSessions.find(s => s.id === id);
            if (session) {
                session.messages.forEach(msg => {
                    appendMessage(msg.role, msg.text);
                });
            }
            updateHistoryUI();
        }

        function updateHistoryUI() {
            historyList.innerHTML = '';
            chatSessions.forEach((session, index) => {
                const div = document.createElement('div');
                div.classList.add('history-item');
                if (session.id === currentSessionId) div.classList.add('active');
                div.innerText = session.title;
                
                let pressTimer;
                let isLongPress = false;

                const startPress = (e) => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        if(confirm('আপনি কি এই চ্যাটটি মুছে ফেলতে চান?')) {
                            chatSessions = chatSessions.filter(s => s.id !== session.id);
                            localStorage.setItem('dreamChatSessions', JSON.stringify(chatSessions));
                            if(currentSessionId === session.id) startNewChat();
                            updateHistoryUI();
                        }
                    }, 600);
                };

                const cancelPress = () => clearTimeout(pressTimer);

                div.addEventListener('mousedown', startPress);
                div.addEventListener('mouseup', cancelPress);
                div.addEventListener('mouseleave', cancelPress);
                
                div.addEventListener('touchstart', startPress, {passive: true});
                div.addEventListener('touchend', cancelPress);
                div.addEventListener('touchmove', cancelPress);

                div.onclick = () => {
                    if (isLongPress) return;
                    loadSession(session.id);
                };

                historyList.appendChild(div);
            });
        }

        function startNewChat() {
            chatContainer.innerHTML = ''; 
            currentSessionId = null;
            if(sidebar.classList.contains('open')) toggleSidebar();
            updateHistoryUI();
        }

        function clearAllHistory() {
            if(confirm('আপনি কি পূর্বের সব হিস্ট্রি মুছে ফেলতে চান?')) {
                chatSessions = [];
                localStorage.removeItem('dreamChatSessions');
                startNewChat();
            }
        }
    </script>
</body>
  </html>
