<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dev-Onix AI</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
align-items:center;
background:#fdd;
color:#000;
font-family:Arial;
}

h1{
 text-align: center;
font-size:40px;
letter-spacing:2px;
font-family: Georgia, serif;
}
input {
  height: 50px;
  width: 300px;
  border:#000 3px solid ;
  border-radius: 10px;
  font-size:20px;
}
div {
  margin-left:8%;
  margin-top:60%;
}
h2 {
  margin-left:2%;
  margin-bottom:3px;
  font-size:30px;
}
.button-group{
  display:flex;
  justify-content:space-between;
  width:250px;
  margin-top:3%;
}

.button-group button{
  padding:8% 8%;
  font-size:30px;
  border:solid 2px #000;
  color:#fff;
  border-radius:15px;
  margin-left:15%;
}
.back-btn{
  background-color:#00f; 
  margin-left:2px;
}
.next-btn{
  background-color:#00f; 
}
.button-group a{
  text-decoration:none;
}
.Dev {
  margin-top:8%;
  margin-left:0%;
}
  /* এনিমেশন */
  body{
margin:0;
padding:0;
}

.ai-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:url("rahul.jpg");
background-size:cover;
background-position:center;
z-index:-1;
}

/* glowing light animation */
.ai-bg::after{
content:"";
position:absolute;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(0,255,255,0.8) 2px, transparent 4px);
background-size:120px 120px;
animation: moveLight 6s linear infinite;
opacity:0.6;
}

@keyframes moveLight{
0%{
background-position:0 0;
}
100%{
background-position:200px 200px;
}
}
</style>
</head>
<body>
<div class="ai-bg"></div>
<h1><i>Dev-Onix AI</i></h1>
 <div class="box">
   <h2>First Name</h2>
  <input type="text" placeholder="Rahul">
  <div class="Dev">
    <h2>Last Name</h2>
    <input type="text"placeholder="Dev">
  </div> </div>
   <div class="button-group">
  <a href=""><button class="back-btn">←Back</button></button></a>
  <a href=""><button class="next-btn">Next→</button></a>
 </div>
</body>
</html>
