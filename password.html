<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>
<style>
body{
margin:0;
padding:0;
height:100vh;
align-items:center;
background:#fdd;
color:#000;
font-family:Georgia, serif;
}
h1{
font-size:40px;
letter-spacing:2px;
margin-top:40px;
text-align:center;
}
h2 {
  margin-bottom:3px;
}
.div {
  margin-top:60%;
  margin-left:8%;
}
 .text {
   height:45px;
  width:80%;
  border-radius:10px;
  font-size:20px;
 }
 span{
  margin-left:1%;
  font-size:20px;
}
.btn,.sub {
  height:20%;
  width:28%;
  margin-top:10%;
  font-size:25px;
  border:solid 2px #000;
  border-radius: 5px;
}
.sub {
  margin-left:20%;
  color:#fff;
  background-color:#00f;
}
.btn {
  margin-left:10%;
  color:#00f;
  background-color:#fff;
}
/* h1 animation */
  h1 {
text-align:center;
font-size:40px;
color:#000;
margin-top:40px;
/* animation */
animation: dropDown 2s ease forwards;
}
/* animation system */
@keyframes dropDown{
0%{
transform:translateY(-200px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}
/*input animation */
h2{
animation: fromLeft 2s ease;
}
.text{
animation: fromRight 2s ease;
}
@keyframes fromLeft{
0%{
transform:translateX(-200px);
opacity:0;
}
100%{
transform:translateX(0);
opacity:1;
}
}
@keyframes fromRight{
0%{
transform:translateX(200px);
opacity:0;
}
100%{
transform:translateX(0);
opacity:1;
}
}
/* btn and sub animation */
.btn, .sub{
animation: fromBottom 3s ease;
}
@keyframes fromBottom{
0%{
transform:translateY(200px);
opacity:0;
}
100%{
transform:translateY();
opacity:1;
}
}
/*body animation */
body{
margin:0;
padding:0;
height:100vh;
background: linear-gradient(
270deg,
#c00,
#0c0,
#00c,
#cc0,
#c0c
);
background-size:1000% 1000%;
animation: bgMove 15s ease infinite;
}
/* animation */
@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
} }
</style>
</head>
<body>
<h1><i>Dev-Onix AI</i></h1>
 <form>
   <div class="div">
     <h2>Password</h2>
     <input type="password" id="text" class="text" placeholder="Enter your password" required>
<span onclick="togglePass()" style="cursor:pointer;">👁️</span>
   </div>
   <div>
     <a href="country.html"><button class="btn" type="button">Back</button></a>
     <input type="submit" value="Next" class="sub">
   </div>
   </div>
 </form>
 
<script>
function togglePass(){
  let p = document.getElementById("text");
  p.type = (p.type === "password") ? "text" : "password";
}
</script>
</body>
</html>
