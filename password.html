<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>

<!-- 🔥 তোমার CSS একদম same রাখা হয়েছে -->
<style>
body{
margin:0;
padding:0;
height:100vh;
align-items:center;
background:#fdd;
color:#000;
font-family:Georgia, serif;
}

h1{
font-size:40px;
letter-spacing:2px;
margin-top:40px;
text-align:center;
animation: dropDown 2s ease forwards;
}

h2 {
  margin-bottom:3px;
}

.div {
  margin-top:60%;
  margin-left:8%;
}

.text {
  height:45px;
  width:80%;
  border-radius:10px;
  font-size:20px;
}

span{
  margin-left:1%;
  font-size:20px;
  cursor:pointer;
}

.btn,.sub {
  height:20%;
  width:28%;
  margin-top:10%;
  font-size:25px;
  border:solid 2px #000;
  border-radius: 5px;
}

.sub {
  margin-left:20%;
  color:#fff;
  background-color:#00f;
}

.btn {
  margin-left:10%;
  color:#00f;
  background-color:#fff;
}

.title{
text-align:center;
font-size:40px;
color:#000;
margin-top:20%;
font-family: Georgia, serif;
/* animation */
animation: dropDown 2s ease forwards;
}

/* animation system */
@keyframes dropDown{
0%{
transform:translateY(-200px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}
}
</style>
</head>

<body>

<h1 class="title"><i>Dev-Onix AI</i></h1>

<form action="agree.html" onsubmit="return checkPassword()">

  <div class="div">

    <h2>Password</h2>

    <!-- ✔ class + id same (CSS safe) -->
    <input type="password" id="text" class="text"
    placeholder="Enter your password"
    minlength="8" maxlength="10" required>

    <!-- ✔ eye icon -->
    <span id="eyeIcon" onclick="togglePass()">👁️</span>

    <!-- message -->
    <p id="msg" style="color:red; font-size:14px;"></p>

    <p style="font-size:15px; color:#000;">
       * Password must be 8 to 10 characters
    </p>

  </div>

  <div>

    <!-- ✔ FIXED back button -->
    <button type="button" class="btn" onclick="goBack()">Back</button>

    <input type="submit" value="SignUp" class="sub">

  </div>

</form>

<script>

// 🔥 PASSWORD VALIDATION
function checkPassword(){
  let pass = document.getElementById("text").value;
  let msg = document.getElementById("msg");

  if(pass.length < 8){
    msg.innerText = "❌ Password too short (min 8)";
    return false;
  }
  else if(pass.length > 10){
    msg.innerText = "❌ Password too long (max 10)";
    return false;
  }
  else{
    localStorage.setItem("userPassword", pass); // SAVE PASSWORD
    return true;
  }
}

// 🔥 SHOW / HIDE PASSWORD
function togglePass(){
  let input = document.getElementById("text");
  let icon = document.getElementById("eyeIcon");

  if(input.type === "password"){
    input.type = "text";
    icon.innerText = "🙈";
  }else{
    input.type = "password";
    icon.innerText = "👁️";
  }
}

// 🔥 BACK BUTTON
function goBack(){
  window.location.href = "phone.html";
}
</script>
</body>
</html>
