<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev-Onix AI</title>
<style>
body{
margin:0;
padding:0;
height:100vh;
align-items:center;
background:#fdd;
color:#000;
font-family:Georgia, serif;
}
h1{
font-size:40px;
letter-spacing:2px;
text-align:center;
font-family:Georgia, serif;
}
.div {
  margin-top:70%;
  margin-left:8%;
}
.input {
  height:45px;
  width:90%;
  border-radius:10px;
  font-size:20px;
  border:solid 3px #000;
}
h2 {
  margin-bottom:3px;
  margin-left:5%;
}
.btn,.sub {
  height:20%;
  width:28%;
  margin-top:10%;
  font-size:25px;
  border:solid 2px #000;
  border-radius: 5px;
}
.sub {
  margin-left:20%;
  color:#fff;
  background-color:#00f;
}
.btn {
  margin-left:10%;
  color:#00f;
  background-color:#fff;
}
/* h1 animation */
.title{
text-align:center;
font-size:40px;
color:#000;
margin-top:40px;
/* animation */
animation: dropDown 2s ease forwards;
}
/* animation system */
@keyframes dropDown{
0%{
transform:translateY(-200px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}
/* input date and h2 animation */
h2{
animation: fromLeft 2s ease;
}
.input{
animation: fromRight 2s ease;
}
@keyframes fromLeft{
0%{
transform:translateX(-200px);
opacity:0;
}
100%{
transform:translateX(0);
opacity:1;
}
}
@keyframes fromRight{
0%{
transform:translateX(200px);
opacity:0;
}
100%{
transform:translateX(0);
opacity:1;
}
}
/* btn and sub animation */
.btn, .sub{
animation: fromBottom 3s ease;
}
@keyframes fromBottom{
0%{
transform:translateY(200px);
opacity:0;
}
100%{
transform:translateY();
opacity:1;
}
}
/*body animation */
body{
margin:0;
padding:0;
height:100vh;
background: linear-gradient(
270deg,
#0dd,
#c0a,
#a00,
#f00,
#f0f
);
background-size:1000% 1000%;
animation: bgMove 15s ease infinite;
}
/* animation */
@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
} }
</style>
</head>
<body>
<h1 class="title"><i>Dev-Onix AI</i></h1>
<form action="country.html" onsubmit="saveData()">
  <input type="date" class="input" id="date" required>

  <input type="submit" value="Next" class="sub">
</form>

<script>
function saveData(){
  localStorage.setItem("dob", document.getElementById("date").value);
}

window.onload = function(){
  document.getElementById("date").value =
    localStorage.getItem("dob") || "";
}
</script>
</body>
</html>
