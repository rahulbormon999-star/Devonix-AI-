<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dev-Onix AI | Pro Profile</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    :root { 
        --primary: #6366f1; 
        --bg: #f1f5f9; 
        --text-dark: #1e293b;
        --text-light: #64748b;
    }
    body { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        margin: 0; 
        padding: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        min-height: 100vh;
    }
    .app-container { 
        background: white; 
        width: 100%; 
        max-width: 420px; 
        height: 100vh;
        max-height: 850px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        position: relative;
        overflow: hidden;
    }
    
    /* PC view curve corners */
    @media (min-width: 450px) {
        .app-container { border-radius: 20px; height: 90vh; }
    }

    /* Views container */
    .view-section {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: white;
        padding: 20px;
        transition: transform 0.3s ease-in-out;
        transform: translateX(100%); /* Hidden by default */
        overflow-y: auto;
    }
    .view-section.active {
        transform: translateX(0); /* Show active view */
    }

    /* Header */
    .header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
        padding-top: 10px;
    }
    .header i {
        font-size: 20px;
        color: var(--text-dark);
        cursor: pointer;
        padding: 10px;
        margin-left: -10px;
    }
    .header h2 {
        margin: 0;
        font-size: 22px;
        color: var(--text-dark);
        flex-grow: 1;
        text-align: center;
        padding-right: 20px;
    }

    /* Profile Image area */
    .profile-box { text-align: center; margin-bottom: 30px; position: relative; }
    #preview { 
        width: 120px; height: 120px; 
        border-radius: 50%; object-fit: cover; 
        border: 4px solid var(--primary); 
        cursor: pointer; 
        box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
    }
    .camera-icon {
        position: absolute;
        bottom: 5px; right: calc(50% - 60px);
        background: var(--primary);
        color: white;
        width: 32px; height: 32px;
        border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer;
        border: 2px solid white;
    }

    /* Menu List */
    .menu-list { display: flex; flex-direction: column; gap: 15px; }
    .menu-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px;
        background: #f8fafc;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover { background: #e2e8f0; }
    .menu-item .info h4 { margin: 0; font-size: 15px; color: var(--text-dark); }
    .menu-item .info p { margin: 5px 0 0; font-size: 14px; color: var(--text-light); }
    .menu-item .arrow { color: #cbd5e1; font-size: 14px; }

    /* Inputs inside Sub-pages */
    label { font-size: 14px; color: var(--text-light); margin: 15px 0 5px; display: block; }
    input, select { 
        width: 100%; padding: 14px; 
        border: 1px solid #e2e8f0; 
        border-radius: 10px; 
        box-sizing: border-box; 
        outline: none; font-size: 16px; 
        background: #f8fafc;
        margin-bottom: 15px;
    }
    input:focus, select:focus { border-color: var(--primary); background: white; }
    
    button.save-btn { 
        width: 100%; padding: 15px; 
        background: var(--primary); color: white; 
        border: none; border-radius: 10px; 
        font-size: 16px; font-weight: bold; 
        margin-top: 15px; cursor: pointer; 
        transition: 0.3s; 
    }
    button.save-btn:active { transform: scale(0.98); }

</style>
</head>

            </div>
        </div>
    </div>

    <!-- ================= SUB VIEWS (EDIT PAGES) ================= -->

    <!-- Edit Name View -->
    <div id="name-view" class="view-section">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeView()"></i>
            <h2>Edit Name</h2>
        </div>
        <label>First Name</label>
        <input id="fname" placeholder="First Name">
        <label>Last Name</label>
        <input id="lname" placeholder="Last Name">
        <button class="save-btn" onclick="saveData('name')">Save Name</button>
    </div>

    <!-- Edit Phone View -->
    <div id="phone-view" class="view-section">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeView()"></i>
            <h2>Edit Phone</h2>
        </div>
        <label>Phone Number</label>
        <input id="phone" type="tel" placeholder="+880 1xxx xxxxxx">
        <button class="save-btn" onclick="saveData('phone')">Save Phone</button>
    </div>

    <!-- Edit Country View -->
    <div id="country-view" class="view-section">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeView()"></i>
            <h2>Edit Country</h2>
        </div>
        <label>Country</label>
        <input id="country" placeholder="Bangladesh">
        <button class="save-btn" onclick="saveData('country')">Save Country</button>
    </div>

    <!-- Edit Gender View -->
    <div id="gender-view" class="view-section">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeView()"></i>
            <h2>Edit Gender</h2>
        </div>
        <label>Gender</label>
        <select id="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <button class="save-btn" onclick="saveData('gender')">Save Gender</button>
    </div>

    <!-- Edit DOB View -->
    <div id="dob-view" class="view-section">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeView()"></i>
            <h2>Date of Birth</h2>
        </div>
        <label>Date of Birth</label>
        <input type="date" id="dob">
        <button class="save-btn" onclick="saveData('dob')">Save Date of Birth</button>
    </div>

</div>

<script>

// Navigation Functions
function openView(viewId) {
    document.querySelectorAll('.view-section').forEach(view => {
        view.classList.remove('active');
    });
    document.getElementById(viewId).classList.add('active');
}

function closeView() {
    openView('main-view');
}

// Load Data
function loadProfileData() {

    let savedImg = localStorage.getItem("profileImage");

    document.getElementById("preview").src =
        savedImg || "https://ui-avatars.com/api/?name=User";

    let fname = localStorage.getItem("fname") || "";
    let lname = localStorage.getItem("lname") || "";
    let phone = localStorage.getItem("phone") || "";
    let country = localStorage.getItem("coun") || "";
    let gender = localStorage.getItem("gender") || "";
    let dob = localStorage.getItem("dob") || "";

    // Input values
    document.getElementById("fname").value = fname;
    document.getElementById("lname").value = lname;
    document.getElementById("phone").value = phone;
    document.getElementById("country").value = country;
    document.getElementById("gender").value = gender;
    document.getElementById("dob").value = dob;

    // Display values
    let fullName = (fname + " " + lname).trim();

    document.getElementById("display-name").innerText =
        fullName || "Not set";

    document.getElementById("display-phone").innerText =
        phone || "Not set";

    document.getElementById("display-country").innerText =
        country || "Not set";

    document.getElementById("display-gender").innerText =
        gender || "Not set";

    document.getElementById("display-dob").innerText =
        dob || "Not set";
}

// Page Load
window.onload = loadProfileData;

// Profile Image Save
document.getElementById("image").addEventListener("change", function(e){

    let file = e.target.files[0];

    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(){

        let base64Img = reader.result;

        document.getElementById("preview").src = base64Img;

        localStorage.setItem("profileImage", base64Img);

    };

    reader.readAsDataURL(file);

});

// Save Data
function saveData(type) {

    if(type === "name") {

        localStorage.setItem(
            "fname",
            document.getElementById("fname").value
        );

        localStorage.setItem(
            "lname",
            document.getElementById("lname").value
        );
    }

    else if(type === "phone") {

        localStorage.setItem(
            "phone",
            document.getElementById("phone").value
        );
    }

    else if(type === "country") {

        localStorage.setItem(
            "coun",
            document.getElementById("country").value
        );
    }

    else if(type === "gender") {

        localStorage.setItem(
            "gender",
            document.getElementById("gender").value
        );
    }

    else if(type === "dob") {

        localStorage.setItem(
            "dob",
            document.getElementById("dob").value
        );
    }

    loadProfileData();

    closeView();
}

        </script>
